{% extends "base.html" %}

{% block title %}Sendspin - Multiroom Audio{% endblock %}

{% block content %}
<h1>Sendspin Clients</h1>

<div class="section">
    <button class="btn" onclick="loadStatus()">Refresh Status</button>
</div>

<div id="sendspin-status">
    <p class="text-muted">Loading...</p>
</div>

<script>
async function loadStatus() {
    const container = document.getElementById('sendspin-status');
    container.innerHTML = '<p>Loading...</p>';

    try {
        const response = await fetch('/api/system/sendspin');
        const data = await response.json();

        if (!data.clients || Object.keys(data.clients).length === 0) {
            container.innerHTML = '<p class="text-muted">No sendspin clients configured.</p>';
            return;
        }

        let html = '<div class="services-grid">';
        for (const [roomId, client] of Object.entries(data.clients)) {
            const statusClass = client.active ? 'active' : 'inactive';
            html += `
                <div class="service-row ${statusClass}">
                    <span class="service-name">${roomId}</span>
                    <span class="service-status">${client.status}</span>
                </div>
            `;
        }
        html += '</div>';

        container.innerHTML = html;
    } catch (e) {
        container.innerHTML = `<p class="error">Connection error: ${e.message}</p>`;
    }
}

// Auto-load on page load
loadStatus();
</script>
{% endblock %}
